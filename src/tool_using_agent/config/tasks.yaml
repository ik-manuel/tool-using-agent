analyze_project:
  description: >
    Analyze the project located at {project_path}.
    User request: {analysis_goal}.

    MANDATORY WORKFLOW:

    Step 1: CALL "List Directory" tool with path: {project_path}
            Study the output carefully. Note every file and folder listed.

    Step 2: CALL "Read File" tool ONLY on files that appeared in Step 1.
            NEVER attempt to read a file that was not listed.
            If a read_file call returns an error, skip that file entirely
            and do NOT include it in your report.

    Step 3: CALL "Web Search" for relevant best practices if needed.

    Step 4: Write analysis based ONLY on files successfully read in Step 2.
            If a file's read returned an error OR returned no content,
            do not write ANY code or analysis for that file.
            Only quote code that appeared verbatim in a successful Read File output.

    Step 5: CALL "Write Report" tool ONCE to save findings.
            Do not call Write Report more than once.

  expected_output: >
    A markdown report grounded exclusively in files that were successfully
    read. Every finding must reference a real file from the directory listing.
    No invented files, no generic advice disconnected from the actual codebase.
  agent: project_analyst





